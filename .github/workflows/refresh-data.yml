name: Daily Baseball Data Refresh
on:
  schedule:
    - cron: '0 11 * * *'  # 6 AM EST (11 AM UTC)
  workflow_dispatch:  # Allows manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev zlib1g-dev pkg-config
          
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("dplyr", "readr", "tibble", "stringr", "stringi", "jsonlite", "janitor", "remotes", "curl", "httr", "rvest"), repos = c(CRAN = "https://cloud.r-project.org"))'
          Rscript -e 'library(curl); library(httr); library(rvest)'
          Rscript -e 'remotes::install_version("qs", version = "0.27.3", repos = c(CRAN = "https://cloud.r-project.org"))'
          Rscript -e 'install.packages("baseballr", repos = c(CRAN = "https://cloud.r-project.org"))'
          Rscript -e 'library(baseballr); packageVersion("baseballr")'
            
      - name: Refresh baseball data
        run: Rscript refresh_data.R

      - name: Validate refresh PR token
        env:
          REFRESH_PR_TOKEN: ${{ secrets.REFRESH_PR_TOKEN }}
        run: |
          if [[ -z "${REFRESH_PR_TOKEN}" ]]; then
            echo "REFRESH_PR_TOKEN secret is not set."
            exit 1
          fi

      - name: Set refresh metadata
        id: refresh_meta
        run: |
          echo "refresh_date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "refresh_timestamp=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Create pull request for refreshed data
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.REFRESH_PR_TOKEN }}
          branch: automated/daily-data-refresh
          delete-branch: true
          commit-message: "Daily data refresh ${{ steps.refresh_meta.outputs.refresh_date }}"
          title: "Daily data refresh ${{ steps.refresh_meta.outputs.refresh_date }}"
          body: |
            Automated daily refresh generated at `${{ steps.refresh_meta.outputs.refresh_timestamp }}` for:
            - `full_stats_hitters.csv`
            - `full_stats_pitchers.csv`
            - `player_lookup.csv`
          add-paths: |
            full_stats_hitters.csv
            full_stats_pitchers.csv
            player_lookup.csv

      - name: Enable auto-merge for refresh PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.REFRESH_PR_TOKEN }}
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
